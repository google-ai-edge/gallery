<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Calendar Email Interface</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        overflow-x: hidden;
      }
      
      .container {
        width: 100%;
        max-width: 500px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        margin-top: 20px;
        color: #333;
      }
      
      .header {
        text-align: center;
        margin-bottom: 30px;
      }
      
      .icon {
        font-size: 60px;
        margin-bottom: 15px;
      }
      
      h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 10px;
        color: #333;
      }
      
      .subtitle {
        font-size: 16px;
        color: #666;
        margin-bottom: 5px;
      }
      
      .card {
        background: white;
        border-radius: 15px;
        padding: 25px;
        margin-bottom: 20px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        border: 1px solid #e0e0e0;
      }
      
      .card-title {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 15px;
        color: #4285f4;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      
      .card-title i {
        font-size: 24px;
      }
      
      .info-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        padding-bottom: 12px;
        border-bottom: 1px solid #f0f0f0;
      }
      
      .info-label {
        font-weight: 500;
        color: #666;
      }
      
      .info-value {
        font-weight: 600;
        color: #333;
      }
      
      .slots-container {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        margin-top: 15px;
      }
      
      .slot {
        background: #e8f0fe;
        border-radius: 8px;
        padding: 12px;
        text-align: center;
        font-weight: 600;
        color: #4285f4;
        border: 2px solid transparent;
        transition: all 0.2s;
      }
      
      .slot:hover {
        background: #d2e3fc;
        border-color: #4285f4;
        cursor: pointer;
      }
      
      .slot.selected {
        background: #4285f4;
        color: white;
      }
      
      .actions {
        display: flex;
        gap: 15px;
        margin-top: 30px;
      }
      
      .btn {
        flex: 1;
        padding: 16px;
        border-radius: 12px;
        font-weight: 600;
        font-size: 16px;
        border: none;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
      
      .btn-primary {
        background: #4285f4;
        color: white;
      }
      
      .btn-primary:hover {
        background: #3367d6;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(66, 133, 244, 0.3);
      }
      
      .btn-secondary {
        background: #f1f3f4;
        color: #333;
      }
      
      .btn-secondary:hover {
        background: #e8eaed;
        transform: translateY(-2px);
      }
      
      .btn:active {
        transform: translateY(0);
      }
      
      .success-message {
        background: #34a853;
        color: white;
        padding: 20px;
        border-radius: 15px;
        text-align: center;
        margin-top: 20px;
        display: none;
      }
      
      .success-message.show {
        display: block;
        animation: fadeIn 0.5s;
      }
      
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      .back-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        backdrop-filter: blur(10px);
      }
      
      .back-btn:hover {
        background: rgba(255, 255, 255, 0.3);
      }
    </style>
  </head>
  <body>
    <button class="back-btn" onclick="window.history.back()">← Back</button>
    
    <div class="container">
      <div class="header">
        <div class="icon" id="main-icon">📅</div>
        <h1 id="main-title">Calendar Email</h1>
        <div class="subtitle" id="main-subtitle">Manage your events and invitations</div>
      </div>
      
      <div id="content">
        <!-- Content will be dynamically loaded -->
      </div>
      
      <div class="success-message" id="success-message">
        <div style="font-size: 32px; margin-bottom: 10px;">✅</div>
        <div id="success-text">Action completed successfully!</div>
      </div>
    </div>

    <script>
      // Get data from URL
      const params = new URLSearchParams(window.location.search);
      const action = params.get('action') || 'create_event';
      const compressedData = params.get('data') || '';
      
      let data = {};
      
      // Decode data
      if (compressedData) {
        try {
          const decoded = decodeURIComponent(escape(atob(compressedData)));
          data = JSON.parse(decoded);
        } catch (e) {
          console.error('Failed to decode data:', e);
          data = { error: 'Failed to load data' };
        }
      }
      
      // Templates
      const templates = {
        create_event: `
          <div class="card">
            <div class="card-title">
              <span>📅</span> Event Created
            </div>
            <div class="info-row">
              <span class="info-label">Title:</span>
              <span class="info-value" id="event-title">${data.title || 'Meeting'}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Date:</span>
              <span class="info-value" id="event-date">${data.date || '2024-12-25'}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Time:</span>
              <span class="info-value" id="event-time">${data.time || '14:00'}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Duration:</span>
              <span class="info-value" id="event-duration">${data.duration || 1.0} hours</span>
            </div>
          </div>
          
          <div class="actions">
            <button class="btn btn-primary" onclick="sendInvite()">
              <span>📧</span> Send Invitation
            </button>
            <button class="btn btn-secondary" onclick="addToCalendar()">
              <span>➕</span> Add to Calendar
            </button>
          </div>
        `,
        
        send_invite: `
          <div class="card">
            <div class="card-title">
              <span>📧</span> Invitation Sent
            </div>
            <div class="info-row">
              <span class="info-label">Event:</span>
              <span class="info-value">${data.eventTitle || 'Meeting'}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Date:</span>
              <span class="info-value">${data.eventDate || '2024-12-25'}</span>
            </div>
            <div class="info-row">
              <span class="info-label">To:</span>
              <span class="info-value">${data.toEmail || 'recipient@example.com'}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Status:</span>
              <span class="info-value" style="color: #34a853;">✓ Sent</span>
            </div>
          </div>
          
          <div class="actions">
            <button class="btn btn-primary" onclick="sendAnother()">
              <span>📧</span> Send Another
            </button>
            <button class="btn btn-secondary" onclick="viewCalendar()">
              <span>📅</span> View Calendar
            </button>
          </div>
        `,
        
        check_availability: `
          <div class="card">
            <div class="card-title">
              <span>⏰</span> Available Time Slots
            </div>
            <div class="info-row">
              <span class="info-label">Date:</span>
              <span class="info-value">${data.date || '2024-12-25'}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Available Slots:</span>
              <span class="info-value">${data.slots ? data.slots.length : 4}</span>
            </div>
          </div>
          
          <div class="slots-container" id="slots-container">
            ${(data.slots || ['09:00 - 10:00', '11:00 - 12:00', '14:00 - 15:00', '16:00 - 17:00'])
              .map(slot => `<div class="slot" onclick="selectSlot(this)">${slot}</div>`)
              .join('')}
          </div>
          
          <div class="actions">
            <button class="btn btn-primary" onclick="scheduleSelected()">
              <span>📅</span> Schedule at Selected Time
            </button>
            <button class="btn btn-secondary" onclick="checkAnotherDate()">
              <span>🔍</span> Check Another Date
            </button>
          </div>
        `
      };
      
      // UI functions
      function updateUI() {
        const content = document.getElementById('content');
        const mainIcon = document.getElementById('main-icon');
        const mainTitle = document.getElementById('main-title');
        const mainSubtitle = document.getElementById('main-subtitle');
        
        // Update header
        switch (action) {
          case 'create_event':
            mainIcon.textContent = '📅';
            mainTitle.textContent = 'Event Created';
            mainSubtitle.textContent = 'Your event has been scheduled';
            break;
          case 'send_invite':
            mainIcon.textContent = '📧';
            mainTitle.textContent = 'Invitation Sent';
            mainSubtitle.textContent = 'Email invitation has been sent';
            break;
          case 'check_availability':
            mainIcon.textContent = '⏰';
            mainTitle.textContent = 'Availability';
            mainSubtitle.textContent = 'Available time slots';
            break;
        }
        
        // Update content
        content.innerHTML = templates[action] || templates.create_event;
      }
      
      function selectSlot(element) {
        // Remove selected class from all slots
        document.querySelectorAll('.slot').forEach(slot => {
          slot.classList.remove('selected');
        });
        
        // Add selected class to clicked slot
        element.classList.add('selected');
      }
      
      function showSuccess(message) {
        const successEl = document.getElementById('success-message');
        const successText = document.getElementById('success-text');
        
        successText.textContent = message || 'Action completed successfully!';
        successEl.classList.add('show');
        
        // Hide after 3 seconds
        setTimeout(() => {
          successEl.classList.remove('show');
        }, 3000);
      }
      
      // Action functions
      function sendInvite() {
        showSuccess('Invitation dialog opened');
      }
      
      function addToCalendar() {
        showSuccess('Added to your calendar');
      }
      
      function sendAnother() {
        showSuccess('Ready to send another invitation');
      }
      
      function viewCalendar() {
        showSuccess('Opening calendar...');
      }
      
      function scheduleSelected() {
        const selectedSlot = document.querySelector('.slot.selected');
        if (selectedSlot) {
          showSuccess(`Scheduled at ${selectedSlot.textContent}`);
        } else {
          showSuccess('Please select a time slot first');
        }
      }
      
      function checkAnotherDate() {
        showSuccess('Ready to check another date');
      }
      
      // Initialize
      updateUI();
    </script>
  </body>
</html>
