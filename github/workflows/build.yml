# 针对 Google AI Edge Gallery 的 GitHub Actions 编译配置
name: Build Google AI Edge Gallery APK

on:
  # 手动触发
  workflow_dispatch: {}
  # 或者每次推送代码时自动触发
  # push: { branches: [ main ] }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 关键步骤：编译生成 Debug APK（无需签名，开箱即用）
    - name: Build Debug APK with Gradle
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    # 上传生成的 APK 文件到 GitHub，方便下载
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: google-ai-edge-gallery-debug
        path: app/build/outputs/apk/debug/*.apk
