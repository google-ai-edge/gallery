name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "claude/**" ]
    paths:
      - 'Android/**'
      - '.github/workflows/build_android.yaml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Android/**'

jobs:
  build_apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Android/src
    steps:
      - name: Checkout the source code
        uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ---- Full flavor (existing Edge Gallery app) ----
      - name: Build full release APK
        run: ./gradlew assembleFullRelease --stacktrace
      - name: Upload full release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-full-release-apk
          path: Android/src/app/build/outputs/apk/full/release/*.apk
          if-no-files-found: error

      # ---- Serveronly flavor (standalone headless server APK) ----
      - name: Build serveronly release APK
        run: ./gradlew assembleServeronlyRelease --stacktrace
      - name: Upload serveronly release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-serveronly-release-apk
          path: Android/src/app/build/outputs/apk/serveronly/release/*.apk
          if-no-files-found: error
