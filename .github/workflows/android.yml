name: Build Android APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: gradle-

    - name: Build Release APKs
      working-directory: Android/src
      run: ./gradlew assembleRelease --no-daemon

    - name: Rename APKs for clarity
      run: |
        cd Android/src/app/build/outputs/apk/release
        for f in *.apk; do
          echo "Found: $f ($(du -h "$f" | cut -f1))"
        done
        # Rename to include ABI in filename
        [ -f app-arm64-v8a-release.apk ] && mv app-arm64-v8a-release.apk gallery-arm64-v8a.apk || true
        [ -f app-armeabi-v7a-release.apk ] && mv app-armeabi-v7a-release.apk gallery-armeabi-v7a.apk || true
        [ -f app-x86_64-release.apk ] && mv app-x86_64-release.apk gallery-x86_64.apk || true
        [ -f app-universal-release.apk ] && mv app-universal-release.apk gallery-universal.apk || true
        ls -lh *.apk

    - name: Upload APKs as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: apks
        path: Android/src/app/build/outputs/apk/release/gallery-*.apk

    # Create GitHub Release when a tag is pushed
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: Android/src/app/build/outputs/apk/release/gallery-*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
