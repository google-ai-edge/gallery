name: Build Server APK (Release)

on:
  workflow_dispatch:
  push:
    tags: [ "server-v*" ]

jobs:
  build_release:
    name: Build serveronly release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Android/src
    steps:
      - name: Checkout the source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Decode keystore (if provided)
        if: ${{ env.SERVER_KEYSTORE_BASE64 != '' }}
        env:
          SERVER_KEYSTORE_BASE64: ${{ secrets.SERVER_KEYSTORE_BASE64 }}
        run: |
          echo "$SERVER_KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/Android/src/release.keystore"

      - name: Build serveronly release APK
        env:
          # When provided, signs the APK with the supplied keystore. If left unset,
          # build.gradle.kts falls back to the debug keystore so the workflow still
          # produces an installable APK for smoke-testing.
          KEYSTORE_PATH: ${{ secrets.SERVER_KEYSTORE_BASE64 != '' && format('{0}/Android/src/release.keystore', github.workspace) || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.SERVER_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SERVER_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.SERVER_KEY_PASSWORD }}
        run: ./gradlew :app:assembleServeronlyRelease --no-daemon --stacktrace

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: edge-gallery-server-release
          path: Android/src/app/build/outputs/apk/serveronly/release/*.apk
          if-no-files-found: error

      - name: Attach to GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/server-v')
        uses: softprops/action-gh-release@v2
        with:
          files: Android/src/app/build/outputs/apk/serveronly/release/*.apk
